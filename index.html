<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EReN System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #080808; color: #e67e22; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: #151515; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; box-shadow: 0 0 20px rgba(230, 126, 34, 0.1); width: 90%; max-width: 400px; }
        .admin-panel { display: none; background: #151515; width: 95%; max-width: 450px; padding: 25px; border-radius: 15px; border-top: 4px solid #e67e22; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e67e22; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #d35400; }
        .code-item { background: #202020; padding: 12px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #2ecc71; }
        .del-btn { background: #c0392b; width: auto; padding: 6px 12px; font-size: 12px; margin: 0; border-radius: 5px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body onload="trackVisitor()">

    <div id="lockScreen" class="login-box">
        <h2 style="color: #e67e22; margin-bottom: 20px;">EReN System</h2>
        <input type="password" id="passInput" placeholder="أدخل الرمز السري">
        <button onclick="unlock()">دخول النظام</button>
    </div>

    <div id="mainPanel" class="admin-panel">
        <h2 style="margin-top:0; color: #fff; text-align: center;">إدارة EReN</h2>
        
        <div style="text-align: right;">
            <label style="color: #888; font-size: 14px;">إضافة كود جديد (14 يوم):</label>
            <input type="text" id="codeId" placeholder="مثل: pay-7777">
            <button onclick="handleAction('add')">+ حفظ وإرسال للديسكورد</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div id="listBody" style="max-height: 300px; overflow-y: auto;">
            </div>
    </div>

    <script>
        // --- إعداداتك الخاصة (عدلها هنا) ---
        const SECRET_KEY = "0615"; 
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1484341798720766273/tsbRq_cNzTIyAormTgLriD15N7PV6VAaqWsQWzCENTD_7tVQnQZRNMdO-1YRfScFA_SE"; 
        const MY_DISCORD_ID = "1226978647295000627"; 
        // --------------------------------

        // 1. تعقب من فتح الرابط
        async function trackVisitor() {
            if(!DISCORD_WEBHOOK || DISCORD_WEBHOOK.includes("https://discord.com/api/webhooks/1484341798720766273/tsbRq_cNzTIyAormTgLriD15N7PV6VAaqWsQWzCENTD_7tVQnQZRNMdO-1YRfScFA_SE")) return;
            
            let ip = "غير معروف";
            let loc = "غير معروف";

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                ip = data.ip;
                loc = `${data.city}, ${data.country_name}`;
            } catch(e) {}

            sendToDiscord({
                content: `<@${MY_DISCORD_ID}> ⚠️ **فيه واحد فتح رابط اللوحة الحين!**`,
                embeds: [{
                    title: "تقرير دخول للرابط",
                    color: 16711680,
                    fields: [
                        { name: "الـ IP", value: ip, inline: true },
                        { name: "الموقع", value: loc, inline: true },
                        { name: "الجهاز", value: navigator.userAgent.slice(0, 80), inline: false }
                    ],
                    timestamp: new Date()
                }]
            });
        }

        // 2. الدخول للوحة
        function unlock() {
            if(document.getElementById('passInput').value === SECRET_KEY) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                showList();
            } else { alert("الرمز خطأ يا بطل!"); }
        }

        // 3. إضافة أو حذف الأكواد
        function handleAction(type, codeParam = "") {
            let db = JSON.parse(localStorage.getItem('eren_db')) || [];
            
            if(type === 'add') {
                const val = document.getElementById('codeId').value.trim();
                if(!val) return;
                
                const d = new Date(); d.setDate(d.getDate() + 14);
                const expiry = d.toLocaleDateString('ar-SA');
                
                db.push({id: val, expire: expiry});
                localStorage.setItem('eren_db', JSON.stringify(db));
                
                sendToDiscord({
                    embeds: [{
                        title: "✅ تم إضافة كود جديد",
                        color: 3066993,
                        fields: [
                            { name: "رقم الكود", value: val, inline: true },
                            { name: "ينتهي في", value: expiry, inline: true }
                        ],
                        timestamp: new Date()
                    }]
                });
                document.getElementById('codeId').value = "";
            } else {
                db = db.filter(x => x.id !== codeParam);
                localStorage.setItem('eren_db', JSON.stringify(db));
                
                sendToDiscord({
                    embeds: [{
                        title: "🗑️ تم حذف كود",
                        color: 15158332,
                        fields: [{ name: "الكود المحذوف", value: codeParam, inline: true }],
                        timestamp: new Date()
                    }]
                });
            }
            showList();
        }

        // 4. عرض الأكواد
        function showList() {
            const container = document.getElementById('listBody');
            container.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('eren_db')) || [];
            if(db.length === 0) container.innerHTML = "<p style='color:#444; text-align:center;'>لا توجد أكواد حالياً</p>";
            
            db.reverse().forEach(item => {
                container.innerHTML += `
                    <div class="code-item">
                        <div style="text-align: right;">
                            <span style="color: #fff; font-weight: bold;">${item.id}</span><br>
                            <small style="color: #888;">ينتهي: ${item.expire}</small>
                        </div>
                        <button class="del-btn" onclick="handleAction('delete', '${item.id}')">حذف</button>
                    </div>`;
            });
        }

        // 5. وظيفة الإرسال للديسكورد
        function sendToDiscord(data) {
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
