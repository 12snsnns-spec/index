<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EReN System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #080808; color: #e67e22; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #151515; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-discord { background: #5865F2; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        .admin-panel { display: none; background: #151515; width: 95%; max-width: 450px; padding: 25px; border-radius: 15px; border-top: 4px solid #e67e22; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; box-sizing: border-box; }
        .code-item { background: #202020; padding: 12px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #2ecc71; }
        .del-btn { background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body onload="checkDiscordLogin()">

    <div id="loginScreen" class="box">
        <h2 style="color: #fff;">نظام EReN</h2>
        <p style="color: #888;">سجل دخولك بالديسكورد للمتابعة</p>
        <button class="btn-discord" onclick="login()">Login with Discord</button>
    </div>

    <div id="lockScreen" class="box" style="display: none;">
        <h2 style="color: #e67e22;">التحقق من الهوية</h2>
        <input type="password" id="passInput" placeholder="أدخل الرمز السري">
        <button onclick="verifyPass()" style="width:100%; padding:12px; background:#e67e22; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">دخول</button>
    </div>

    <div id="mainPanel" class="admin-panel">
        <h3 id="userTag" style="color: #fff; text-align: center; margin-bottom: 20px;"></h3>
        <input type="text" id="newCode" placeholder="أضف كود جديد هنا..">
        <button onclick="addCode()" style="width:100%; padding:12px; background:#e67e22; border:none; color:white; border-radius:8px; cursor:pointer;">+ إضافة للنظام</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div id="codesList"></div>
    </div>

    <script>
        // الويب هوكات الموزعة
        const HOOK_OPEN = "https://discord.com/api/webhooks/1484341798720766273/tsbRq_cNzTIyAormTgLriD15N7PV6VAaqWsQWzCENTD_7tVQnQZRNMdO-1YRfScFA_SE";
        const HOOK_LOGIN = "https://discord.com/api/webhooks/1484351959585525841/ZjhQIJCpA13J8zmqpr6zMNWGDMojVEg7Dn3OAVlhUpRunFJ-MYq2Zxf6kxmFVxjkQxzx";
        const HOOK_PASS = "https://discord.com/api/webhooks/1484352253836923022/AieODQwZH0o7XGe1u6ylvhc0yk5ySci7sb2IHOqYqfGm5I55Jv94Jpwm3cYsFLK-UU-L";
        const HOOK_CODES = "https://discord.com/api/webhooks/1484352399479931063/HXc4SNM70_RheiZsCAdHNj_JPAnGaHEvuS2qsgwFj8Xx0pO0xmdUtiLr-MWqCPBhMy7-";
        
        const AUTH_LINK = "https://discord.com/oauth2/authorize?client_id=1484347551019962489&response_type=token&redirect_uri=https%3A%2F%2F12snsnns-spec.github.io%2Findex%2F&scope=identify";
        const MY_ID = "1226978647295000627";
        const PASS = "0615";
        let user = null;

        function login() { window.location.href = AUTH_LINK; }

        async function sendLog(hook, msg) {
            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: `<@${MY_ID}> ${msg}` })
            });
        }

        async function checkDiscordLogin() {
            // أول ما يفتح الرابط يرسل لوق صامت
            if (!window.location.hash) {
                sendLog(HOOK_OPEN, "🔗 **واحد فتح الرابط الحين (مرحلة تسجيل الدخول)**");
            }

            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const token = fragment.get('access_token');
            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                    user = await res.json();
                    
                    sendLog(HOOK_LOGIN, `👤 **تم تسجيل الدخول بالديسكورد**\n**الاسم:** ${user.username}\n**الأيدي:** \`${user.id}\``);

                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('lockScreen').style.display = 'block';
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) { console.error("Login Failed"); }
            }
        }

        function verifyPass() {
            const input = document.getElementById('passInput').value;
            if(input === PASS) {
                sendLog(HOOK_PASS, `✅ **دخل الرمز السري صح!**\n**المستخدم:** ${user.username}\n**الأيدي:** \`${user.id}\``);
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('userTag').innerText = `أهلاً بك، ${user.username}`;
                renderCodes();
            } else {
                sendLog(HOOK_PASS, `❌ **محاولة دخول فاشلة (رمز خطأ: ${input})**\n**المستخدم:** ${user.username}\n**الأيدي:** \`${user.id}\``);
                alert("الرمز خطأ!");
            }
        }

        function addCode() {
            let val = document.getElementById('newCode').value.trim();
            if(!val) return;
            let db = JSON.parse(localStorage.getItem('eren_codes') || '[]');
            let newObj = { id: Date.now(), text: val };
            db.push(newObj);
            localStorage.setItem('eren_codes', JSON.stringify(db));
            
            sendLog(HOOK_CODES, `➕ **إضافة كود جديد**\n**بواسطة:** ${user.username} (\`${user.id}\`)\n**الكود:** \`${val}\``);
            
            document.getElementById('newCode').value = "";
            renderCodes();
        }

        function delCode(uniqueId, text) {
            let db = JSON.parse(localStorage.getItem('eren_codes') || '[]');
            db = db.filter(item => item.id !== uniqueId);
            localStorage.setItem('eren_codes', JSON.stringify(db));
            
            sendLog(HOOK_CODES, `🗑️ **حذف كود**\n**بواسطة:** ${user.username} (\`${user.id}\`)\n**الكود المحذوف:** \`${text}\``);
            
            renderCodes();
        }

        function renderCodes() {
            let db = JSON.parse(localStorage.getItem('eren_codes') || '[]');
            let html = "";
            [...db].reverse().forEach(item => {
                html += `<div class="code-item"><span>${item.text}</span><button class="del-btn" onclick="delCode(${item.id}, '${item.text}')">حذف</button></div>`;
            });
            document.getElementById('codesList').innerHTML = html || "<p style='color:#444; text-align:center;'>لا توجد أكواد</p>";
        }
    </script>
</body>
</html>
