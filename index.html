<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EReN System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #080808; color: #e67e22; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: #151515; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; box-shadow: 0 0 20px rgba(230, 126, 34, 0.1); }
        .admin-panel { display: none; background: #151515; width: 95%; max-width: 450px; padding: 25px; border-radius: 15px; border-top: 4px solid #e67e22; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; }
        button { width: 100%; padding: 12px; background: #e67e22; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .code-item { background: #202020; padding: 12px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid #2ecc71; }
        .del-btn { background: #c0392b; width: auto; padding: 6px 12px; font-size: 12px; }
    </style>
</head>
<body onload="trackVisitor()">

    <div id="lockScreen" class="login-box">
        <h2 style="color: #e67e22; margin-bottom: 20px;">EReN System</h2>
        <input type="password" id="passInput" placeholder="أدخل الرمز السري">
        <button onclick="unlock()">دخول</button>
    </div>

    <div id="mainPanel" class="admin-panel">
        <h2 style="margin-top:0; color: #fff;">إدارة متجر EReN</h2>
        <input type="text" id="codeId" placeholder="اسم الكود..">
        <button onclick="handleAction('add')">+ إضافة وإرسال</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div id="listBody"></div>
    </div>

    <script>
        const SECRET_KEY = "0615";
        const DISCORD_WEBHOOK = "ضع_رابط_الويب_هوك_هنا"; 
        const MY_DISCORD_ID = "https://discord.com/api/webhooks/1484341798720766273/tsbRq_cNzTIyAormTgLriD15N7PV6VAaqWsQWzCENTD_7tVQnQZRNMdO-1YRfScFA_SE"; //  ID حقك عشان يمنشنك

        async function trackVisitor() {
            if(DISCORD_WEBHOOK === "https://discord.com/api/webhooks/1484341798720766273/tsbRq_cNzTIyAormTgLriD15N7PV6VAaqWsQWzCENTD_7tVQnQZRNMdO-1YRfScFA_SE") return;

            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const msg = {
                    content: `<@${MY_DISCORD_ID}> ⚠️ **انتبه! فيه شخص فتح رابط اللوحة الآن**`,
                    username: "EReN Security Bot",
                    embeds: [{
                        title: "تقرير دخول مشبوه",
                        color: 16711680,
                        fields: [
                            { name: "الـ IP", value: data.ip || "غير معروف", inline: true },
                            { name: "الموقع", value: `${data.city}, ${data.country_name}`, inline: true },
                            { name: "الجهاز", value: navigator.userAgent.substring(0, 50), inline: false }
                        ],
                        footer: { text: "حماية ايرين" },
                        timestamp: new Date()
                    }]
                };

                fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) });
            } catch (e) { console.log("Track error"); }
        }

        function unlock() {
            if(document.getElementById('passInput').value === SECRET_KEY) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                showList();
            } else { alert("الرمز خطأ!"); }
        }

        async function sendLog(title, color, code, expiry = "") {
            const msg = {
                username: "EReN Log",
                embeds: [{
                    title: title,
                    color: color,
                    fields: [{ name: "الكود", value: code, inline: true }],
                    timestamp: new Date()
                }]
            };
            if(expiry) msg.embeds[0].fields.push({ name: "الانتهاء", value: expiry, inline: true });
            fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) });
        }

        function handleAction(type, codeParam = "") {
            let db = JSON.parse(localStorage.getItem('eren_private_db')) || [];
            if(type === 'add') {
                const val = document.getElementById('codeId').value.trim();
                if(!val) return;
                const d = new Date(); d.setDate(d.getDate() + 14);
                const expiry = d.toLocaleDateString('ar-SA');
                db.push({id: val, expire: expiry});
                localStorage.setItem('eren_private_db', JSON.stringify(db));
                sendLog("✅ إضافة كود", 3066993, val, expiry);
                document.getElementById('codeId').value = "";
            } else {
                db = db.filter(x => x.id !== codeParam);
                localStorage.setItem('eren_private_db', JSON.stringify(db));
                sendLog("🗑️ حذف كود", 15158332, codeParam);
            }
            showList();
        }

        function showList() {
            const container = document.getElementById('listBody');
            container.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('eren_private_db')) || [];
            db.reverse().forEach(item => {
                container.innerHTML += `<div class="code-item"><span>${item.id}<br><small>${item.expire}</small></span><button class="del-btn" onclick="handleAction('delete', '${item.id}')">حذف</button></div>`;
            });
        }
    </script>
</body>
</html>
