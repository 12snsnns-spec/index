<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EReN Private System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #e67e22; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .admin-panel { display: none; background: #1a1a1a; width: 90%; max-width: 500px; padding: 30px; border-radius: 15px; border-top: 5px solid #e67e22; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; }
        button { width: 100%; padding: 12px; background: #e67e22; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .code-item { background: #222; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 3px solid #2ecc71; }
        .del-btn { background: #c0392b; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="lockScreen" class="login-box">
        <h2 style="color: #e67e22;">EReN Private System</h2>
        <input type="password" id="passInput" placeholder="أدخل رمز الدخول الخاص بك">
        <button onclick="unlock()">دخول النظام</button>
    </div>

    <div id="mainPanel" class="admin-panel">
        <h2 style="margin-top:0;">إدارة أكواد ايرين</h2>
        
        <label>إضافة كود جديد (صالح لـ 14 يوم):</label>
        <input type="text" id="codeId" placeholder="pay-0001">
        <button onclick="saveNew()">+ حفظ الكود</button>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <label>ابحث عن كود سابق:</label>
        <input type="text" id="search" placeholder="اكتب رقم الكود.." onkeyup="showList(this.value)">

        <div id="codesDisplay" style="margin-top:20px;">
            <strong>الأكواد المسجلة (14 يوم):</strong>
            <div id="listBody"></div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "1234"; 

        function unlock() {
            if(document.getElementById('passInput').value === SECRET_KEY) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                showList();
            } else { alert("الرمز خطأ!"); }
        }

        function saveNew() {
            const val = document.getElementById('codeId').value.trim();
            if(!val) return;
            let db = JSON.parse(localStorage.getItem('eren_private_db')) || [];
            
            // --- تعديل الـ 14 يوم هنا ---
            const d = new Date();
            d.setDate(d.getDate() + 14); // إضافة 14 يوم بالضبط
            const expiry = d.toLocaleDateString('ar-SA');
            // --------------------------

            db.push({id: val, expire: expiry});
            localStorage.setItem('eren_private_db', JSON.stringify(db));
            document.getElementById('codeId').value = "";
            showList();
        }

        function showList(filter = "") {
            const container = document.getElementById('listBody');
            container.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('eren_private_db')) || [];
            db.forEach((item, i) => {
                if(item.id.includes(filter)) {
                    container.innerHTML += `
                        <div class="code-item">
                            <span><b>${item.id}</b><br><small>ينتهي في: ${item.expire}</small></span>
                            <button class="del-btn" onclick="remove(${i})">حذف</button>
                        </div>`;
                }
            });
        }

        function remove(i) {
            let db = JSON.parse(localStorage.getItem('eren_private_db')) || [];
            db.splice(i, 1);
            localStorage.setItem('eren_private_db', JSON.stringify(db));
            showList();
        }
    </script>
</body>
</html>
