<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EReN Admin | لوحة الإدارة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --admin-color: #e67e22; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-box { background: var(--card); width: 90%; max-width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(230, 126, 34, 0.2); border-top: 5px solid var(--admin-color); display: none; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; }
        h2 { color: var(--admin-color); margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--admin-color); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .code-item { background: #252525; padding: 10px; margin: 10px 0; border-radius: 8px; border-right: 3px solid #2ecc71; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h2>EReN Admin Login</h2>
        <input type="password" id="adminPass" placeholder="أدخل كلمة المرور الخاصة بك">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div id="adminPanel" class="admin-box">
        <h2>لوحة تحكم ايرين (الخاصة)</h2>
        <p style="color: #888; font-size: 13px;">إدارة أكواد العملاء والبحث عنها</p>
        
        <hr style="border-color: #333;">

        <div style="margin-bottom: 25px;">
            <strong>إنشاء كود جديد (pay-xxxx):</strong>
            <input type="text" id="newCode" placeholder="أدخل الكود">
            <button onclick="addCode()">حفظ في القاعدة</button>
        </div>

        <div style="margin-bottom: 25px;">
            <strong>البحث عن كود:</strong>
            <input type="text" id="searchBox" placeholder="اكتب الكود للبحث.." onkeyup="search()">
        </div>

        <div id="list">
            <strong>قائمة الأكواد النشطة:</strong>
            <div id="codeList"></div>
        </div>
    </div>

    <script>
        const MY_PASS = "0615"; // <--- غير كلمة المرور من هنا يا وحش

        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === MY_PASS) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderCodes();
            } else {
                alert("كلمة مرور خاطئة!");
            }
        }

        function addCode() {
            const code = document.getElementById('newCode').value.trim();
            if(!code) return;
            
            let codes = JSON.parse(localStorage.getItem('eren_db')) || [];
            
            // تحديد التاريخ (بعد سنة من اليوم)
            const d = new Date();
            d.setFullYear(d.getFullYear() + 1);
            const expiry = d.toLocaleDateString('ar-SA');

            codes.push({ id: code, date: expiry });
            localStorage.setItem('eren_db', JSON.stringify(codes));
            document.getElementById('newCode').value = "";
            renderCodes();
        }

        function renderCodes(filter = "") {
            const listDiv = document.getElementById('codeList');
            listDiv.innerHTML = "";
            let codes = JSON.parse(localStorage.getItem('eren_db')) || [];

            codes.forEach((item, index) => {
                if (item.id.includes(filter)) {
                    listDiv.innerHTML += `
                        <div class="code-item">
                            <span><b>${item.id}</b> <br> <small>ينتهي: ${item.date}</small></span>
                            <button class="delete-btn" onclick="removeCode(${index})">حذف</button>
                        </div>
                    `;
                }
            });
        }

        function search() {
            const val = document.getElementById('searchBox').value;
            renderCodes(val);
        }

        function removeCode(index) {
            let codes = JSON.parse(localStorage.getItem('eren_db')) || [];
            codes.splice(index, 1);
            localStorage.setItem('eren_db', JSON.stringify(codes));
            renderCodes();
        }
    </script>
</body>
</html>
